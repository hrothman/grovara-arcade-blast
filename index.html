<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0d14" />
    <title>Grovara B2B Blaster | Expo West 2026</title>
    <meta name="description" content="Old B2B is broken. Grovara is built for what's next. Play the B2B Blaster game at Expo West!" />
    <meta name="author" content="Grovara" />
    
    <meta property="og:title" content="Grovara B2B Blaster" />
    <meta property="og:description" content="Old B2B is broken. Play the arcade game and discover amazing brands!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://blaster.grovara.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Grovara" />
    <meta name="twitter:image" content="https://blaster.grovara.com/og-image.png" />
    
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div id="root"></div>
    
    <!-- Initial Loading Screen (shown immediately, before JS loads) -->
    <div id="initial-loader" style="
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: system-ui, -apple-system, sans-serif;
    ">
      <div style="
        width: 80px;
        height: 80px;
        border: 8px solid rgba(255,255,255,0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      "></div>
      <h1 style="
        color: white;
        font-size: 28px;
        font-weight: bold;
        margin: 0 0 8px 0;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      ">GROVARA B2B BLASTER</h1>
      <p style="
        color: rgba(255,255,255,0.8);
        font-size: 14px;
        margin: 0;
      ">Loading game...</p>
    </div>
    
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes fadeOut {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }
      
      .loader-hidden {
        animation: fadeOut 0.5s ease-out forwards;
      }
    </style>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
